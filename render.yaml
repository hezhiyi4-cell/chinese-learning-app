services:
  - type: web
    name: chinese-learning-api
    runtime: go
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: go build -o app ./cmd/server
    startCommand: ./app
    healthCheckPath: /health
    envVars:
      - key: GO_VERSION
        value: 1.21.13
      - key: JWT_SECRET
        generateValue: true
      - key: DEFAULT_ADMIN_EMAIL
        value: admin@chineseapp.com
      - key: DEFAULT_ADMIN_PASSWORD
        value: Admin123456
      - key: SQLITE_PATH
        value: chinese_learning.db
      - key: UPLOAD_DIR
        value: ./uploads
